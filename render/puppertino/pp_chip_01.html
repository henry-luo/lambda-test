<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: #f5f5f7; padding: 4px; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; }
  .p-chip { margin: 2px; }
  .p-chip span { margin: 2px; padding: 4px 8px; font-size: 11px; }
</style>
<link rel="stylesheet" href="res/puppertino.css">
</head>
<body>
  <label class="p-chip"><input type="checkbox"><span>Tag A</span></label>
  <label class="p-chip"><input type="checkbox" checked><span>Tag B</span></label>
  <label class="p-chip"><input type="checkbox"><span>Tag C</span></label>
</body>
</html>
