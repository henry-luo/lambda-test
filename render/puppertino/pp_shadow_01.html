<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: #f5f5f7; padding: 6px; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; font-size: 9px; }
  .box { width: 80px; height: 18px; background: white; border-radius: 6px; margin-bottom: 4px; display: flex; align-items: center; padding: 0 6px; }
</style>
<link rel="stylesheet" href="res/puppertino.css">
</head>
<body>
  <div class="box p-shadow-1">Shadow 1</div>
  <div class="box p-shadow-2">Shadow 2</div>
  <div class="box p-shadow-3">Shadow 3</div>
  <div class="box p-shadow-4">Shadow 4</div>
</body>
</html>
