<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; }
  .p-card { margin: 4px; padding: 8px 0; border-radius: 12px; }
  .p-card-content { padding: 0 8px; }
  .p-card-title { font-size: 11px; }
  .p-card-text { font-size: 9px; }
</style>
<link rel="stylesheet" href="res/puppertino.css">
</head>
<body>
  <div class="p-card">
    <div class="p-card-content">
      <h3 class="p-card-title">Card Title</h3>
      <p class="p-card-text">A short card description text here.</p>
    </div>
  </div>
</body>
</html>
