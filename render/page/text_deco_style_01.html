<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; font-family: sans-serif; font-size: 14px; padding: 4px; }
  .dashed { text-decoration: underline dashed #e74c3c; margin-bottom: 4px; }
  .dotted { text-decoration: underline dotted #3498db; margin-bottom: 4px; }
  .wavy   { text-decoration: underline wavy #2ecc71; margin-bottom: 4px; }
  .double { text-decoration: underline double #9b59b6; }
</style>
</head>
<body>
  <div class="dashed">dashed</div>
  <div class="dotted">dotted</div>
  <div class="wavy">wavy</div>
  <div class="double">double</div>
</body>
</html>
