<html>
<head>

<style>
  * { margin: 0; padding: 0; }

  body { background: white; }
  .outer {
    width: 70px; height: 70px;
    margin: 15px;
    background: #3498db;
    opacity: 0.7;
  }
  .inner {
    width: 40px; height: 40px;
    margin: 15px;
    background: #e74c3c;
    opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="outer">
    <div class="inner"></div>
  </div>
</body>
</html>
