<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  table {
    border-collapse: separate;
    border-spacing: 2px;
    margin: 5px;
  }
  td {
    width: 16px; height: 16px;
    border: 2px solid #2c3e50;
  }
  .r { background: #e74c3c; }
  .b { background: #3498db; }
  .g { background: #2ecc71; }
  .y { background: #f39c12; }
</style>
</head>
<body>
  <table>
    <tr><td class="r"></td><td class="b"></td><td class="g"></td><td class="y"></td></tr>
    <tr><td class="y"></td><td class="r"></td><td class="b"></td><td class="g"></td></tr>
    <tr><td class="g"></td><td class="y"></td><td class="r"></td><td class="b"></td></tr>
    <tr><td class="b"></td><td class="g"></td><td class="y"></td><td class="r"></td></tr>
  </table>
</body>
</html>
