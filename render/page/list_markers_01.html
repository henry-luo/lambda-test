<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 150px; height: 150px; overflow: hidden; background: white; }
  ul {
    list-style-type: disc;
    margin-left: 30px;
    font-size: 18px;
    font-family: serif;
    color: #2c3e50;
  }
  li { margin: 2px 0; }
  .square { list-style-type: square; }
  .circle { list-style-type: circle; }
</style>
</head>
<body>
  <ul>
    <li>Disc item</li>
    <li class="circle">Circle item</li>
    <li class="square">Square item</li>
    <li>Disc again</li>
    <li class="square">Square again</li>
  </ul>
</body>
</html>
