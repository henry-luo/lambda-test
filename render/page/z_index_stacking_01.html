<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  .container { position: relative; margin: 10px; width: 80px; height: 80px; }
  .box1 {
    position: absolute; z-index: 1;
    left: 0; top: 0; width: 50px; height: 50px;
    background: #e74c3c;
  }
  .box2 {
    position: absolute; z-index: 2;
    left: 20px; top: 20px; width: 50px; height: 50px;
    background: #3498db;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="box1"></div>
    <div class="box2"></div>
  </div>
</body>
</html>
