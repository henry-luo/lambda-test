<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  .double { width: 70px; height: 13px; margin: 5px 15px; background: #ecf0f1; border: 4px double #2c3e50; }
  .groove { width: 70px; height: 13px; margin: 5px 15px; background: #ecf0f1; border: 4px groove #95a5a6; }
  .ridge  { width: 70px; height: 13px; margin: 5px 15px; background: #ecf0f1; border: 4px ridge #95a5a6; }
  .inset  { width: 70px; height: 13px; margin: 5px 15px; background: #ecf0f1; border: 4px inset #bdc3c7; }
</style>
</head>
<body>
  <div class="double"></div>
  <div class="groove"></div>
  <div class="ridge"></div>
  <div class="inset"></div>
</body>
</html>
