<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  svg { width: 90px; height: 90px; margin: 5px; }
</style>
</head>
<body>
  <svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <symbol id="star" viewBox="0 0 20 20">
        <polygon points="10,0 13,7 20,7 14,12 16,20 10,15 4,20 6,12 0,7 7,7"
                 fill="currentColor"/>
      </symbol>
    </defs>
    <!-- Nested group with transforms -->
    <g transform="translate(5,5)">
      <rect width="80" height="80" fill="#ecf0f1" rx="5"/>
      <g transform="translate(10,10)">
        <use href="#star" x="0" y="0" width="20" height="20" color="#e74c3c"/>
        <use href="#star" x="25" y="0" width="20" height="20" color="#f39c12"/>
        <use href="#star" x="50" y="0" width="20" height="20" color="#2ecc71"/>
      </g>
      <g transform="translate(10,35)">
        <use href="#star" x="0" y="0" width="20" height="20" color="#3498db"/>
        <use href="#star" x="25" y="0" width="20" height="20" color="#9b59b6"/>
        <use href="#star" x="50" y="0" width="20" height="20" color="#1abc9c"/>
      </g>
    </g>
  </svg>
</body>
</html>
