<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  .blend {
    width: 80px;
    height: 80px;
    margin: 10px;
    background-color: #e74c3c;
    background-image: linear-gradient(45deg, #3498db, #2ecc71);
    background-blend-mode: multiply;
  }
</style>
</head>
<body>
  <div class="blend"></div>
</body>
</html>
