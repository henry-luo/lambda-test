<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 120px; height: 120px; overflow: hidden; }
  body { background: #ecf0f1; display: flex; align-items: center; justify-content: center; }
  .card {
    width: 70px; height: 60px;
    background: white;
    border: 1px solid #bdc3c7;
    border-radius: 8px;
    box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.2);
    padding: 8px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 12px;
    color: #2c3e50;
  }
  .card .title {
    font-weight: bold;
    font-size: 13px;
    color: #e74c3c;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="title">Card</div>
    <div>Content here with border and shadow.</div>
  </div>
</body>
</html>
