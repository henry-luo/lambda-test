<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  table {
    border-collapse: collapse;
    margin: 5px;
  }
  td {
    border: 1px solid #bdc3c7;
    font: 7px Arial, Helvetica, sans-serif;
    padding: 1px;
  }
  .t1 { border-top: 3px solid #e74c3c; }
  .r1 { border-right: 3px solid #3498db; }
  .b1 { border-bottom: 3px solid #2ecc71; }
  .l1 { border-left: 3px solid #f39c12; }
  .all { border: 3px solid #9b59b6; background: #f5eef8; }
  .none { border: none; background: #ecf0f1; }
  .dashed { border: 2px dashed #e74c3c; }
  .dotted { border: 2px dotted #3498db; }
  .double { border: 3px double #2c3e50; }
</style>
</head>
<body>
  <table>
    <tr><td class="t1">T</td><td class="r1">R</td><td class="b1">B</td></tr>
    <tr><td class="l1">L</td><td class="all">A</td><td class="none">N</td></tr>
    <tr><td class="dashed">Da</td><td class="dotted">Do</td><td class="double">Db</td></tr>
  </table>
</body>
</html>
