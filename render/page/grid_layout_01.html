<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 4px;
    width: 90px;
    height: 60px;
    margin: 5px;
  }
  .grid div:nth-child(1) { background: #e74c3c; }
  .grid div:nth-child(2) { background: #3498db; }
  .grid div:nth-child(3) { background: #2ecc71; }
  .grid div:nth-child(4) { background: #f39c12; }
  .grid div:nth-child(5) { background: #9b59b6; }
  .grid div:nth-child(6) { background: #1abc9c; }
  .span { grid-column: span 2; background: #e67e22 !important; margin-top: 4px; height: 20px; }
</style>
</head>
<body>
  <div class="grid">
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
  </div>
  <div class="span" style="width: 90px; margin-left: 5px;"></div>
</body>
</html>
