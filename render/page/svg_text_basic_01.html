<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  svg { width: 90px; height: 90px; margin: 5px; }
</style>
</head>
<body>
  <svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
    <text x="10" y="25" font-family="Arial" font-size="14" fill="#2c3e50">Hello</text>
    <text x="10" y="50" font-family="Arial" font-size="12" fill="#e74c3c" font-weight="bold">Bold</text>
    <text x="50" y="50" font-family="Arial" font-size="12" fill="#3498db" font-style="italic">Italic</text>
    <text x="10" y="75" font-family="Arial" font-size="10" fill="#8e44ad">Small text</text>
  </svg>
</body>
</html>
