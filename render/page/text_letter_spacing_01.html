<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; background: white; }
  .normal {
    font-size: 14px;
    font-family: monospace;
    color: #2c3e50;
    margin: 8px 5px;
  }
  .spaced {
    font-size: 14px;
    font-family: monospace;
    color: #e74c3c;
    letter-spacing: 6px;
    margin: 8px 5px;
  }
  .tight {
    font-size: 14px;
    font-family: monospace;
    color: #3498db;
    letter-spacing: -1px;
    margin: 8px 5px;
  }
</style>
</head>
<body>
  <div class="normal">ABCDE</div>
  <div class="spaced">ABCDE</div>
  <div class="tight">ABCDE</div>
</body>
</html>
