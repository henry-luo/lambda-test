<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; background: white; }
  ul {
    font-size: 9px;
    font-family: serif;
    color: #2c3e50;
    margin-left: 18px;
  }
  li { margin: 2px 0; }
  .outside { list-style-position: outside; }
  .inside { list-style-position: inside; }
  h3 { font-size: 9px; margin: 2px 0 1px 2px; color: #555; }
</style>
</head>
<body>
  <h3>Outside:</h3>
  <ul class="outside">
    <li>Bullet out</li>
    <li>Second</li>
  </ul>
  <h3>Inside:</h3>
  <ul class="inside">
    <li>Bullet in</li>
    <li>Second</li>
  </ul>
</body>
</html>
