<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; padding: 5px; }
  .clipped {
    width: 40px; height: 40px;
    float: left; margin: 2px;
  }
  .inset { clip-path: inset(5px); background: #e74c3c; }
  .circle { clip-path: circle(40%); background: #3498db; }
  .ellipse { clip-path: ellipse(40% 30% at 50% 50%); background: #2ecc71; }
  .poly { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); background: #f39c12; }
</style>
</head>
<body>
  <div class="clipped inset"></div>
  <div class="clipped circle"></div>
  <div class="clipped ellipse"></div>
  <div class="clipped poly"></div>
</body>
</html>
