<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  svg { width: 90px; height: 90px; margin: 5px; }
</style>
</head>
<body>
  <svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
    <!-- Stroke styles -->
    <line x1="5" y1="10" x2="85" y2="10" stroke="#e74c3c" stroke-width="2"/>
    <line x1="5" y1="25" x2="85" y2="25" stroke="#3498db" stroke-width="3"
          stroke-dasharray="8,4"/>
    <line x1="5" y1="40" x2="85" y2="40" stroke="#2ecc71" stroke-width="2"
          stroke-dasharray="2,3"/>
    <!-- Stroked shapes -->
    <rect x="5" y="50" width="35" height="30" fill="none"
          stroke="#f39c12" stroke-width="2"/>
    <circle cx="67" cy="65" r="15" fill="none"
            stroke="#8e44ad" stroke-width="2"/>
  </svg>
</body>
</html>
