<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  .box { width: 35px; height: 35px; float: left; margin: 5px; }
  .tl { border-radius: 15px 0 0 0; background: #e74c3c; }
  .tr { border-radius: 0 15px 0 0; background: #3498db; }
  .bl { border-radius: 0 0 0 15px; background: #2ecc71; }
  .br { border-radius: 0 0 15px 0; background: #f39c12; }
</style>
</head>
<body>
  <div class="box tl"></div><div class="box tr"></div>
  <div class="box bl"></div><div class="box br"></div>
</body>
</html>
