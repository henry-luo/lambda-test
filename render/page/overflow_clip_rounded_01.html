<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  .container {
    width: 80px; height: 80px;
    margin: 10px;
    overflow: hidden;
    border-radius: 10px;
    border: 1px solid #ccc;
  }
  .content {
    width: 120px; height: 120px;
    background: linear-gradient(135deg, #e74c3c 0%, #3498db 50%, #2ecc71 100%);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="content"></div>
  </div>
</body>
</html>
