<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  table {
    border-collapse: collapse;
    margin: 10px;
  }
  td {
    width: 35px; height: 35px;
    border: 2px solid #2c3e50;
  }
  td:nth-child(1) { background: #ecf0f1; }
  td:nth-child(2) { background: #bdc3c7; }
</style>
</head>
<body>
  <table>
    <tr><td></td><td></td></tr>
    <tr><td></td><td></td></tr>
  </table>
</body>
</html>
