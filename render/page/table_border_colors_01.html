<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  table {
    border-collapse: collapse;
    margin: 5px;
  }
  td {
    width: 20px; height: 20px;
    border: 1px solid #bdc3c7;
  }
  .c1 { border-color: #e74c3c; border-width: 2px; }
  .c2 { border-color: #3498db; border-width: 3px; }
  .c3 { border-color: #2ecc71; border-width: 1px; }
  .c4 { border-color: #f39c12; border-width: 4px; }
  td:nth-child(1) { background: #fef9e7; }
  td:nth-child(2) { background: #eaf2f8; }
  td:nth-child(3) { background: #e8f8f5; }
</style>
</head>
<body>
  <table>
    <tr><td class="c1"></td><td class="c2"></td><td class="c3"></td></tr>
    <tr><td class="c4"></td><td class="c1"></td><td class="c2"></td></tr>
    <tr><td class="c3"></td><td class="c4"></td><td class="c1"></td></tr>
  </table>
</body>
</html>
