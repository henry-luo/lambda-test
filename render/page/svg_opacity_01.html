<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  svg { width: 90px; height: 90px; margin: 5px; }
</style>
</head>
<body>
  <svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
    <!-- Opacity on fill -->
    <rect x="5" y="5" width="30" height="30" fill="#e74c3c" opacity="0.3"/>
    <rect x="20" y="20" width="30" height="30" fill="#3498db" opacity="0.5"/>
    <!-- Fill opacity vs stroke opacity -->
    <circle cx="65" cy="25" r="18" fill="#2ecc71" fill-opacity="0.4"
            stroke="#2c3e50" stroke-width="2" stroke-opacity="1"/>
    <!-- Group opacity -->
    <g opacity="0.5">
      <rect x="5" y="55" width="35" height="30" fill="#f39c12"/>
      <circle cx="22" cy="70" r="10" fill="#8e44ad"/>
    </g>
    <!-- Full opacity reference -->
    <rect x="55" y="55" width="30" height="30" fill="#1abc9c"/>
  </svg>
</body>
</html>
