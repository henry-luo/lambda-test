<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; padding: 5px; }
  .pill {
    width: 80px; height: 24px;
    background: #3498db;
    border-radius: 12px;
    margin-bottom: 5px;
  }
  .circle {
    width: 30px; height: 30px;
    background: #e74c3c;
    border-radius: 50%;
    float: left; margin-right: 5px;
  }
  .circle2 {
    width: 30px; height: 30px;
    background: #2ecc71;
    border-radius: 50%;
    border: 2px solid #27ae60;
    float: left;
  }
</style>
</head>
<body>
  <div class="pill"></div>
  <div class="pill" style="background: #9b59b6; height: 20px; border-radius: 10px;"></div>
  <div class="circle"></div>
  <div class="circle2"></div>
</body>
</html>
