<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  .container {
    display: flex;
    width: 90px;
    margin: 5px;
    gap: 5px;
  }
  .container div {
    flex: 1;
    height: 25px;
  }
  .row1 .a { background: #e74c3c; }
  .row1 .b { background: #3498db; }
  .row1 .c { background: #2ecc71; }
  .row2 {
    flex-direction: column;
    height: 55px;
  }
  .row2 .a { background: #9b59b6; }
  .row2 .b { background: #f39c12; flex: 2; }
</style>
</head>
<body>
  <div class="container row1">
    <div class="a"></div>
    <div class="b"></div>
    <div class="c"></div>
  </div>
  <div class="container row2">
    <div class="a"></div>
    <div class="b"></div>
  </div>
</body>
</html>
