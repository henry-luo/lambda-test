<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  .box {
    width: 40px;
    height: 40px;
    margin: 5px 30px;
    background: red;
  }
  .hue { filter: hue-rotate(120deg); }
</style>
</head>
<body>
  <div class="box"></div>
  <div class="box hue"></div>
</body>
</html>
