<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; background: white; }
  .border-box {
    width: 80px;
    height: 25px;
    margin: 5px 10px;
    padding: 5px;
    border: 5px dashed #2c3e50;
    background: #e74c3c;
    background-clip: border-box;
  }
  .padding-box {
    width: 80px;
    height: 25px;
    margin: 5px 10px;
    padding: 5px;
    border: 5px dashed #2c3e50;
    background: #3498db;
    background-clip: padding-box;
  }
</style>
</head>
<body>
  <div class="border-box"></div>
  <div class="padding-box"></div>
</body>
</html>
