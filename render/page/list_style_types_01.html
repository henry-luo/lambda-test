<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; background: white; }
  ol {
    margin-left: 25px;
    font-size: 9px;
    font-family: serif;
    color: #2c3e50;
  }
  li { margin: 1px 0; }
  .roman { list-style-type: lower-roman; }
  .alpha { list-style-type: upper-alpha; }
  .decimal-lz { list-style-type: decimal-leading-zero; }
</style>
</head>
<body>
  <ol>
    <li>Decimal</li>
    <li>Decimal</li>
  </ol>
  <ol class="roman">
    <li>Roman</li>
    <li>Roman</li>
  </ol>
  <ol class="alpha">
    <li>Alpha</li>
    <li>Alpha</li>
  </ol>
</body>
</html>
