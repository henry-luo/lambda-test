<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  /* clip-path with gradient background */
  .clipped-gradient {
    position: absolute; top: 5px; left: 5px;
    width: 90px; height: 40px;
    background: linear-gradient(90deg, #e74c3c, #3498db);
    clip-path: ellipse(45% 40% at 50% 50%);
  }
  /* clip-path with border (border should be clipped too) */
  .clipped-border {
    position: absolute; top: 55px; left: 5px;
    width: 40px; height: 40px;
    background: #2ecc71;
    border: 3px solid #27ae60;
    clip-path: circle(45% at 50% 50%);
    box-sizing: border-box;
  }
  /* clip-path with box-shadow (shadow should be clipped) */
  .clipped-shadow {
    position: absolute; top: 55px; left: 55px;
    width: 40px; height: 40px;
    background: #f39c12;
    box-shadow: 0 0 5px rgba(0,0,0,0.5);
    clip-path: inset(5px round 8px);
  }
</style>
</head>
<body>
  <div class="clipped-gradient"></div>
  <div class="clipped-border"></div>
  <div class="clipped-shadow"></div>
</body>
</html>
