<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; padding: 4px; font: 8px Arial, Helvetica, sans-serif; color: #2c3e50; }
  select {
    width: 90px; height: 14px;
    border: 1px solid #bdc3c7;
    font: 8px Arial, Helvetica, sans-serif;
    background: white;
    margin-bottom: 4px;
    display: block;
  }
  textarea {
    width: 90px; height: 35px;
    border: 1px solid #bdc3c7;
    padding: 2px;
    font: 8px Arial, Helvetica, sans-serif;
    resize: none;
    margin-bottom: 4px;
    display: block;
  }
  label { display: block; font-size: 7px; color: #7f8c8d; margin-bottom: 1px; }
  .btns { display: flex; gap: 3px; }
  .primary {
    background: #3498db; color: white;
    padding: 3px 10px;
    font: bold 8px Arial, Helvetica, sans-serif;
    border-radius: 3px;
    border: none;
  }
  .secondary {
    background: #ecf0f1; color: #2c3e50;
    padding: 3px 10px;
    font: bold 8px Arial, Helvetica, sans-serif;
    border-radius: 3px;
    border: 1px solid #bdc3c7;
  }
</style>
</head>
<body>
  <label>Category</label>
  <select>
    <option selected>Option B</option>
  </select>
  <label>Notes</label>
  <textarea></textarea>
  <div class="btns">
    <button class="primary">Save</button>
    <button class="secondary">Cancel</button>
  </div>
</body>
</html>
