<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; padding: 4px; font: 8px Arial, Helvetica, sans-serif; color: #2c3e50; }
  input[type="text"] {
    width: 90px; height: 14px;
    border: 1px solid #bdc3c7;
    padding: 1px 3px;
    font: 8px Arial, Helvetica, sans-serif;
    margin-bottom: 3px;
    display: block;
    background: white;
  }
  input[type="text"]:focus { border-color: #3498db; }
  button {
    background: #3498db;
    color: white;
    border: none;
    padding: 2px 8px;
    font: bold 8px Arial, Helvetica, sans-serif;
    border-radius: 3px;
    cursor: pointer;
    margin-top: 2px;
  }
  label { display: block; margin-bottom: 1px; color: #7f8c8d; font-size: 7px; }
</style>
</head>
<body>
  <label>Name</label>
  <input type="text" value="John Doe">
  <label>Email</label>
  <input type="text" value="john@test.com">
  <label>City</label>
  <input type="text" value="New York">
  <button>Submit</button>
</body>
</html>
