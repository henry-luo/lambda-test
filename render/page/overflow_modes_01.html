<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  .box {
    position: absolute;
    overflow: hidden;
  }
  .content {
    width: 60px; height: 60px;
  }
  .a { left: 5px; top: 5px; width: 40px; height: 40px; }
  .a .content { background: linear-gradient(135deg, #e74c3c, #3498db); }
  .b { left: 55px; top: 5px; width: 40px; height: 40px; border-radius: 20px; }
  .b .content { background: linear-gradient(135deg, #2ecc71, #f39c12); }
  .c { left: 5px; top: 55px; width: 40px; height: 40px; border: 2px solid #2c3e50; }
  .c .content { background: linear-gradient(45deg, #9b59b6, #1abc9c); }
  .d { left: 55px; top: 55px; width: 40px; height: 40px; border-radius: 8px; border: 2px solid #e74c3c; }
  .d .content { background: linear-gradient(45deg, #f39c12, #e74c3c); }
</style>
</head>
<body>
  <div class="box a"><div class="content"></div></div>
  <div class="box b"><div class="content"></div></div>
  <div class="box c"><div class="content"></div></div>
  <div class="box d"><div class="content"></div></div>
</body>
</html>
