<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  .outer {
    width: 80px;
    margin: 10px;
  }
  .auto {
    width: 50px;
    height: 20px;
    margin: 0 auto;
    background: #e74c3c;
  }
  .border-box {
    width: 80px;
    height: 20px;
    padding: 5px;
    border: 3px solid #3498db;
    box-sizing: border-box;
    background: #ecf0f1;
    margin-top: 5px;
  }
  .content-box {
    width: 60px;
    height: 14px;
    padding: 3px;
    border: 2px solid #2ecc71;
    box-sizing: content-box;
    background: #ecf0f1;
    margin-top: 5px;
  }
</style>
</head>
<body>
  <div class="outer">
    <div class="auto"></div>
    <div class="border-box"></div>
    <div class="content-box"></div>
  </div>
</body>
</html>
