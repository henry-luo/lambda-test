<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; padding: 5px; }
  .shadow1 {
    width: 60px; height: 25px;
    background: #3498db;
    border-radius: 6px;
    box-shadow: 3px 3px 5px rgba(0,0,0,0.3);
    margin: 5px auto 10px;
  }
  .shadow2 {
    width: 60px; height: 25px;
    background: #e74c3c;
    border-radius: 6px;
    box-shadow: 0 0 8px rgba(231,76,60,0.5);
    margin: 5px auto;
  }
</style>
</head>
<body>
  <div class="shadow1"></div>
  <div class="shadow2"></div>
</body>
</html>
