<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  table {
    width: 80px;
    margin: 10px;
    border-spacing: 3px;
    font-size: 9px;
    font-family: sans-serif;
  }
  td {
    padding: 3px;
    text-align: center;
  }
  .h { background: #3498db; color: white; font-weight: bold; }
  .r1 { background: #ecf0f1; }
  .r2 { background: #d5dbdb; }
  .wide { width: 50%; }
</style>
</head>
<body>
  <table>
    <tr><td class="h wide">A</td><td class="h">B</td><td class="h">C</td></tr>
    <tr><td class="r1">1</td><td class="r1">2</td><td class="r1">3</td></tr>
    <tr><td class="r2">4</td><td class="r2">5</td><td class="r2">6</td></tr>
    <tr><td class="r1">7</td><td class="r1">8</td><td class="r1">9</td></tr>
  </table>
</body>
</html>
