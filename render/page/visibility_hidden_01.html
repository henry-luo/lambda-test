<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  .hidden {
    width: 100px; height: 50px;
    background: #e74c3c;
    visibility: hidden;
  }
  .visible {
    width: 100px; height: 50px;
    background: #2ecc71;
  }
</style>
</head>
<body>
  <div class="hidden"></div>
  <div class="visible"></div>
</body>
</html>
