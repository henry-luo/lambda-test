<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  /* Circle container clipping image-like content */
  .circle-clip {
    position: absolute; top: 5px; left: 5px;
    width: 40px; height: 40px;
    overflow: hidden;
    border-radius: 50%;
    border: 2px solid #2c3e50;
    box-sizing: border-box;
  }
  .circle-clip .fill {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #e74c3c, #f39c12, #2ecc71);
  }
  /* Pill shape clipping */
  .pill-clip {
    position: absolute; top: 8px; left: 55px;
    width: 40px; height: 20px;
    overflow: hidden;
    border-radius: 10px;
    background: #3498db;
  }
  .pill-clip .text-like {
    width: 60px; height: 20px;
    background: repeating-linear-gradient(90deg, #2980b9 0px, #2980b9 4px, #3498db 4px, #3498db 8px);
  }
  /* Rounded square clipping rotated child */
  .rounded-clip {
    position: absolute; top: 50px; left: 5px;
    width: 45px; height: 45px;
    overflow: hidden;
    border-radius: 8px;
    background: #ecf0f1;
  }
  .rounded-clip .rotated {
    width: 45px; height: 45px;
    background: linear-gradient(45deg, #8e44ad, #2980b9);
    transform: rotate(45deg);
    transform-origin: center center;
  }
  /* Asymmetric border-radius clipping */
  .asym-clip {
    position: absolute; top: 50px; left: 55px;
    width: 40px; height: 40px;
    overflow: hidden;
    border-radius: 20px 5px 20px 5px;
    background: #e67e22;
  }
</style>
</head>
<body>
  <div class="circle-clip"><div class="fill"></div></div>
  <div class="pill-clip"><div class="text-like"></div></div>
  <div class="rounded-clip"><div class="rotated"></div></div>
  <div class="asym-clip"></div>
</body>
</html>
