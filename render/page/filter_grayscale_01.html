<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  .box {
    width: 40px;
    height: 40px;
    margin: 5px 30px;
    background: linear-gradient(to right, red, green, blue);
  }
  .gray { filter: grayscale(100%); }
</style>
</head>
<body>
  <div class="box"></div>
  <div class="box gray"></div>
</body>
</html>
