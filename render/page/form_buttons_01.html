<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; padding: 4px; font: 8px Arial, Helvetica, sans-serif; }
  .row { display: flex; gap: 3px; margin-bottom: 3px; }
  button, .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font: bold 7px Arial, Helvetica, sans-serif;
    border-radius: 3px;
    padding: 3px 5px;
    border: none;
    cursor: pointer;
  }
  .blue { background: #3498db; color: white; }
  .red { background: #e74c3c; color: white; }
  .green { background: #2ecc71; color: white; }
  .orange { background: #f39c12; color: white; }
  .outline { background: white; border: 1px solid #3498db; color: #3498db; }
  .pill { border-radius: 10px; padding: 3px 8px; }
  .dark { background: #2c3e50; color: white; }
  .ghost { background: transparent; color: #2c3e50; border: 1px solid #bdc3c7; }
  .disabled { opacity: 0.4; }
  .lg { padding: 4px 10px; font-size: 9px; }
  .sm { padding: 2px 4px; font-size: 6px; }
</style>
</head>
<body>
  <div class="row">
    <button class="blue">OK</button>
    <button class="red">Del</button>
    <button class="green">Go</button>
    <button class="orange">Edit</button>
  </div>
  <div class="row">
    <button class="outline">Link</button>
    <button class="pill blue">Pill</button>
    <button class="dark">Dark</button>
  </div>
  <div class="row">
    <button class="ghost">Ghost</button>
    <button class="blue disabled">Off</button>
    <button class="lg blue">Big</button>
    <button class="sm red">Sm</button>
  </div>
</body>
</html>
