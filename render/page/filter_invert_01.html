<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; background: white; }
  .box {
    width: 80px;
    height: 40px;
    margin: 5px 10px;
    background: black;
  }
  .invert { filter: invert(100%); }
</style>
</head>
<body>
  <div class="box"></div>
  <div class="box invert"></div>
</body>
</html>
