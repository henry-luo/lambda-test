<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; padding: 5px; }
  .box {
    width: 80px; height: 20px;
    margin-bottom: 4px;
    border-radius: 5px;
  }
  .mixed1 {
    border-top: 3px solid #e74c3c;
    border-right: 3px dashed #3498db;
    border-bottom: 3px dotted #2ecc71;
    border-left: 3px double #f39c12;
  }
  .mixed2 {
    border: 2px solid #2c3e50;
    border-left: 4px solid #e74c3c;
    border-right: 4px solid #3498db;
  }
  .mixed3 {
    border-top: 5px solid #8e44ad;
    border-bottom: 1px solid #8e44ad;
    border-left: 2px dashed #8e44ad;
    border-right: 2px dashed #8e44ad;
  }
</style>
</head>
<body>
  <div class="box mixed1"></div>
  <div class="box mixed2"></div>
  <div class="box mixed3"></div>
</body>
</html>
