<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; padding: 5px; }
  .box {
    width: 80px; height: 38px;
    margin-bottom: 5px;
  }
  .multi1 {
    background: #e74c3c;
    border: 2px solid #c0392b;
    border-radius: 8px;
    box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    outline: 2px solid #2c3e50;
    outline-offset: 2px;
  }
  .multi2 {
    background: linear-gradient(to right, #3498db, #2ecc71);
    border: 1px solid #2c3e50;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>
  <div class="box multi1"></div>
  <div class="box multi2"></div>
</body>
</html>
