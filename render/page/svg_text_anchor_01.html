<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  svg { width: 90px; height: 90px; margin: 5px; }
</style>
</head>
<body>
  <svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
    <text x="45" y="20" font-family="Arial" font-size="11" fill="#333"
          text-anchor="middle">Centered</text>
    <text x="85" y="45" font-family="Arial" font-size="11" fill="#c0392b"
          text-anchor="end">Right</text>
    <text x="5" y="45" font-family="Arial" font-size="11" fill="#27ae60"
          text-anchor="start">Left</text>
    <text x="45" y="75" font-family="Arial" font-size="14" fill="#2980b9"
          text-anchor="middle" font-weight="bold">ABC</text>
  </svg>
</body>
</html>
