<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; background: white; }
  .container {
    width: 60px;
    height: 60px;
    margin: 20px;
    background: #ecf0f1;
    overflow: hidden;
    border: 2px solid #2c3e50;
  }
  .inner {
    width: 100px;
    height: 100px;
    background: linear-gradient(135deg, #e74c3c 0%, #3498db 100%);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="inner"></div>
  </div>
</body>
</html>
