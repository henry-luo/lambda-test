<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; padding: 3px; }
  .outer {
    border: 1px solid #bdc3c7;
    font: 7px Arial, Helvetica, sans-serif;
    color: #2c3e50;
  }
  .outer table {
    border-collapse: collapse;
    width: 100%;
  }
  .outer td {
    border: 1px solid #bdc3c7;
    padding: 1px 2px;
  }
  .inner {
    border-collapse: collapse;
    width: 100%;
    background: #ecf0f1;
  }
  .inner td {
    border: 1px solid #95a5a6;
    padding: 1px;
    font: 6px Arial, Helvetica, sans-serif;
  }
  .hdr { background: #3498db; color: white; font-weight: bold; }
</style>
</head>
<body>
  <div class="outer">
    <table>
      <tr><td class="hdr">A</td><td class="hdr">B</td></tr>
      <tr>
        <td>
          <table class="inner">
            <tr><td>1</td><td>2</td></tr>
            <tr><td>3</td><td>4</td></tr>
          </table>
        </td>
        <td>X</td>
      </tr>
      <tr>
        <td>Y</td>
        <td>
          <table class="inner">
            <tr><td>5</td><td>6</td></tr>
          </table>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
