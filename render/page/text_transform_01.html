<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; font-size: 12px; font-family: sans-serif; }
  div {
    width: 80px;
    margin: 4px 10px;
    padding: 2px 4px;
    background: #ecf0f1;
  }
  .upper { text-transform: uppercase; }
  .lower { text-transform: lowercase; }
  .cap { text-transform: capitalize; }
  .wspace { word-spacing: 8px; }
</style>
</head>
<body>
  <div class="upper">hello world</div>
  <div class="lower">HELLO WORLD</div>
  <div class="cap">hello world</div>
  <div class="wspace">a b c d e</div>
</body>
</html>
