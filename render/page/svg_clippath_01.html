<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  svg { width: 90px; height: 90px; margin: 5px; }
</style>
</head>
<body>
  <svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <clipPath id="c1">
        <circle cx="45" cy="25" r="20"/>
      </clipPath>
      <clipPath id="c2">
        <rect x="10" y="50" width="70" height="35" rx="8"/>
      </clipPath>
    </defs>
    <!-- Clipped rectangle -->
    <rect x="5" y="5" width="80" height="40" fill="#e74c3c" clip-path="url(#c1)"/>
    <!-- Clipped gradient -->
    <rect x="5" y="48" width="80" height="40" fill="#3498db" clip-path="url(#c2)"/>
  </svg>
</body>
</html>
