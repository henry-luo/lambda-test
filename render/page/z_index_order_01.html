<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  .container { position: relative; width: 100px; height: 100px; }
  .box {
    position: absolute;
    width: 40px;
    height: 40px;
  }
  .back  { z-index: 1; top: 10px; left: 10px; background: #e74c3c; }
  .mid   { z-index: 2; top: 20px; left: 20px; background: #3498db; }
  .front { z-index: 3; top: 30px; left: 30px; background: #2ecc71; }
</style>
</head>
<body>
  <div class="container">
    <div class="box front"></div>
    <div class="box back"></div>
    <div class="box mid"></div>
  </div>
</body>
</html>
