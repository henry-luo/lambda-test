<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 200px; height: 200px; overflow: hidden; }
  body { background: white; font-family: sans-serif; font-size: 28px; padding: 8px; }
  .red   { text-decoration: underline; text-decoration-color: #e74c3c; margin-bottom: 6px; }
  .blue  { text-decoration: underline; text-decoration-color: #3498db; margin-bottom: 6px; }
  .green { text-decoration: line-through; text-decoration-color: #2ecc71; margin-bottom: 6px; }
  .thick { text-decoration: underline; text-decoration-color: #9b59b6; text-decoration-thickness: 3px; }
</style>
</head>
<body>
  <div class="red">red underline</div>
  <div class="blue">blue under</div>
  <div class="green">strikethrough</div>
  <div class="thick">thick purple</div>
</body>
</html>
