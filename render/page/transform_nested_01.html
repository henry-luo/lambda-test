<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  .outer {
    width: 60px; height: 60px;
    margin: 20px;
    background: #3498db;
    transform: rotate(20deg);
  }
  .inner {
    width: 30px; height: 30px;
    margin: 15px;
    background: #e74c3c;
    transform: rotate(25deg);
  }
</style>
</head>
<body>
  <div class="outer">
    <div class="inner"></div>
  </div>
</body>
</html>
