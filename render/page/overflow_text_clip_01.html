<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  .box {
    width: 60px; height: 30px;
    margin: 5px 20px;
    overflow: hidden;
    border: 1px solid #2c3e50;
    background: #ecf0f1;
    font: 10px Arial, Helvetica, sans-serif;
    color: #2c3e50;
    padding: 2px;
  }
  .box .bar {
    width: 80px; height: 6px;
    background: linear-gradient(90deg, #e74c3c, #3498db);
    margin-top: 2px;
  }
</style>
</head>
<body>
  <div class="box">
    Overflow text that is too long
    <div class="bar"></div>
  </div>
  <div class="box" style="border-radius: 8px;">
    Rounded clip text
    <div class="bar"></div>
  </div>
</body>
</html>
