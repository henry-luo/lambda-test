<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; }
  .parent {
    position: relative;
    width: 80px;
    height: 80px;
    margin: 10px;
    opacity: 0.5;
    background: #3498db;
  }
  .child1 {
    position: absolute;
    top: 10px; left: 10px;
    width: 40px; height: 40px;
    background: #e74c3c;
  }
  .child2 {
    position: absolute;
    top: 25px; left: 25px;
    width: 40px; height: 40px;
    background: #2ecc71;
  }
</style>
</head>
<body>
  <div class="parent">
    <div class="child1"></div>
    <div class="child2"></div>
  </div>
</body>
</html>
