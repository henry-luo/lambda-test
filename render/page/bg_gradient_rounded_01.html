<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; padding: 5px; }
  .box {
    width: 80px; height: 38px;
    margin-bottom: 5px;
    border-radius: 8px;
  }
  .grad1 {
    background: linear-gradient(to right, #e74c3c, #f39c12);
  }
  .grad2 {
    background: linear-gradient(135deg, #3498db, #2ecc71, #9b59b6);
  }
</style>
</head>
<body>
  <div class="box grad1"></div>
  <div class="box grad2"></div>
</body>
</html>
