<!DOCTYPE html>
<!-- Regression test: JS calling method on text node crashed (SIGSEGV in js_dom_element_method via vsnprintf) -->
<!-- Text node's firstChild was cast to DomElement, accessing garbage tag_name -->
<html>
<head><meta charset="utf-8">
<style>
:root { text-autospace: normal; }
</style>
</head>
<body>
<div id="target">国国国国国</div>
<div id="text-target">Hello World</div>
<script>
// replaceData on a text node (firstChild is a text node, not element)
const target_text = document.getElementById('target').firstChild;
document.body.offsetTop;
target_text.replaceData(2, 1, 'AA国国AA');

// Other text node method calls that should not crash
const text2 = document.getElementById('text-target').firstChild;
if (text2 && text2.nodeType === 3) {
  // Calling element methods on a text node should gracefully return null
  text2.remove();
}
</script>
</body>
</html>
