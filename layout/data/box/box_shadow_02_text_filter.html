<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test: text-shadow and filter:blur()</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }

        .container {
            width: 720px;
            padding: 24px;
            background: #fff;
        }

        h2 {
            font-size: 13px;
            color: #666;
            margin: 16px 0 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .row {
            margin-bottom: 20px;
        }

        /* 1. Basic text-shadow (no blur) */
        .ts-basic {
            font-size: 32px;
            font-weight: bold;
            color: #222;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
        }

        /* 2. Text-shadow with blur */
        .ts-blur {
            font-size: 32px;
            font-weight: bold;
            color: #1a5276;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
        }

        /* 3. Colored text-shadow */
        .ts-color {
            font-size: 32px;
            font-weight: bold;
            color: white;
            background: #2c3e50;
            padding: 8px 12px;
            text-shadow: 0 0 8px rgba(52,152,219,0.9), 0 0 16px rgba(52,152,219,0.5);
        }

        /* 4. Multiple text-shadows (layered glow) */
        .ts-multi {
            font-size: 32px;
            font-weight: bold;
            color: #e74c3c;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3),
                         3px 3px 8px rgba(231,76,60,0.4);
        }

        /* 5. filter: blur() */
        .filter-blur-light {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            filter: blur(1px);
        }

        .filter-blur-medium {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            filter: blur(3px);
        }

        /* 6. filter: blur() on a box */
        .filter-blur-box {
            width: 200px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            filter: blur(2px);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }

        /* 7. filter: blur() + other filters */
        .filter-multi {
            width: 200px;
            height: 80px;
            background: #27ae60;
            filter: blur(1px) brightness(1.2);
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>text-shadow: basic (no blur)</h2>
    <div class="row">
        <span class="ts-basic">Hello Shadow</span>
    </div>

    <h2>text-shadow: with blur radius</h2>
    <div class="row">
        <span class="ts-blur">Blurred Shadow Text</span>
    </div>

    <h2>text-shadow: colored glow</h2>
    <div class="row">
        <span class="ts-color">Neon Glow Effect</span>
    </div>

    <h2>text-shadow: multiple layers</h2>
    <div class="row">
        <span class="ts-multi">Layered Shadows</span>
    </div>

    <h2>filter: blur() on text</h2>
    <div class="row" style="display:flex; gap:24px; align-items:center;">
        <div>
            <div class="filter-blur-light">blur(1px)</div>
        </div>
        <div>
            <div class="filter-blur-medium">blur(3px)</div>
        </div>
    </div>

    <h2>filter: blur() on block elements</h2>
    <div class="row" style="display:flex; gap:24px; align-items:center;">
        <div>
            <div class="filter-blur-box">Blurred Box</div>
        </div>
        <div>
            <div class="filter-multi"></div>
        </div>
    </div>
</div>
</body>
</html>
