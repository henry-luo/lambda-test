<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CJK: Korean (Hangul) Word Breaking</title>
<style>
@font-face {
    font-family: 'Noto Sans SC';
    src: url('../font/NotoSansSC-Subset.otf') format('opentype');
}
* { margin: 0; padding: 0; }
body { font-family: 'Noto Sans SC', sans-serif; font-size: 16px; line-height: 1.5; }
div { border: 1px solid #ccc; margin: 10px; padding: 5px; }
</style>
</head>
<body>

<!-- Test 1: Korean with normal word-break (breaks between syllables) -->
<div id="t1" style="width: 200px;">
<p>소년은 개울가에서 소녀를 보자 곧 윤 초시네 증손녀딸이라는 걸 알 수 있었다.</p>
</div>

<!-- Test 2: Korean with word-break: keep-all (break only at spaces) -->
<div id="t2" style="width: 200px; word-break: keep-all;">
<p>소년은 개울가에서 소녀를 보자 곧 윤 초시네 증손녀딸이라는 걸 알 수 있었다.</p>
</div>

<!-- Test 3: Korean with overflow-wrap: break-word (emergency breaks) -->
<div id="t3" style="width: 80px; word-break: keep-all; overflow-wrap: break-word;">
<p>증손녀딸이라는걸알수있었다</p>
</div>

</body>
</html>
