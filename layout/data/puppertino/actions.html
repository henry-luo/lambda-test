<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Actions - Puppertino</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="res/puppertino.css">
  <link rel="stylesheet" href="res/doc.css">
</head>
<body class="p-layout">
  <h1>Actions</h1>

  <!-- Action Sheets (hidden by default, shown via JS) -->
  <div class="p-action-background">
    <div class="p-action-big-container" id="actions" data-p-close-on-outside="true" aria-hidden="true">
      <div class="p-action-container">
        <div class="p-action-title">
          <h3 class="p-action-title--intern">What do you want to do?</h3>
          <p class="p-action-text">Select an option below...</p>
        </div>
        <a href="#" class="p-action--intern p-action-destructive p-action-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          Close this tab
        </a>
        <a href="#" class="p-action--intern p-action-destructive p-action-icon-inline">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          Close this tab
        </a>
        <a href="#" class="p-action--intern p-action-neutral">New private tab</a>
        <a href="#" class="p-action--intern">New tab</a>
      </div>
      <div class="p-action-container">
        <a href="#" class="p-action--intern p-action-cancel" data-p-cancel-action="true">Cancel</a>
      </div>
    </div>

    <div class="p-action-big-container" id="actions_basic" data-p-close-on-outside="true" aria-hidden="true">
      <div class="p-action-container">
        <div class="p-action-title">
          <h3 class="p-action-title--intern">Welcome to actions</h3>
          <p class="p-action-text">Select an option below...</p>
        </div>
        <a href="#" class="p-action--intern p-action-neutral">New private tab</a>
        <a href="#" class="p-action--intern">New tab</a>
      </div>
      <div class="p-action-container">
        <a href="#" class="p-action--intern p-action-cancel" data-p-cancel-action="true">Cancel</a>
      </div>
    </div>
  </div>

  <!-- Trigger Buttons -->
  <div style="margin-top:30px">
    <button class="p-btn" data-p-open-actions="#actions">Open actions with variants</button>
    <button class="p-btn" data-p-open-actions="#actions_basic">Basic Actions</button>
  </div>

  <script src="res/actions.js"></script>
</body>
</html>
