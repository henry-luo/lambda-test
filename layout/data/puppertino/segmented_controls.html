<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Segmented Controls - Puppertino</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="res/puppertino.css">
  <link rel="stylesheet" href="res/doc.css">
  <style>
    .content_smol { display:flex; justify-content:center; flex-wrap:wrap; }
    .mw-300 { width:300px; position:relative; }
    .demo_segmented { --color-segmented:#68b723; --color-lighter-segment:#d1ff82; }
  </style>
</head>
<body class="p-layout">
  <h1>Segmented Controls</h1>

  <!-- Basic Text -->
  <div style="margin-top:30px">
    <div class="content_smol">
      <div class="mw-300">
        <div class="p-segmented-controls">
          <a href="#" class="active">Roadmap</a>
          <button>Satelite</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Icon Controls -->
  <div style="margin-top:30px">
    <div class="content_smol">
      <div class="mw-300">
        <div class="p-segmented-controls">
          <a href="#" class="active"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="17" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="17" y1="18" x2="3" y2="18"></line></svg></a>
          <a href="#"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="21" y1="18" x2="3" y2="18"></line></svg></a>
          <a href="#"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg></a>
          <a href="#"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg></a>
          <a href="#"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg></a>
          <a href="#"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg></a>
        </div>
      </div>
    </div>
  </div>

  <!-- Modifier Variants -->
  <div style="margin-top:30px">
    <div class="content_smol">
      <div class="mw-300">
        <div class="p-segmented-controls p-segmented-radius">
          <a href="#" class="active">Doom</a>
          <a href="#">Quake</a>
        </div>
      </div>
    </div>

    <div class="content_smol" style="margin-top:15px">
      <div class="mw-300">
        <div class="p-segmented-controls p-segmented-radius p-segmented-internal-radius">
          <a href="#" class="active">FIFA</a>
          <a href="#">PES</a>
        </div>
      </div>
    </div>

    <div class="content_smol" style="margin-top:15px">
      <div class="mw-300">
        <div class="p-segmented-controls p-segmented-controls-alt">
          <a href="#" class="active">Thing</a>
          <a href="#">Stuff</a>
          <a href="#">Other</a>
        </div>
      </div>
    </div>

    <div class="content_smol" style="margin-top:15px">
      <div class="mw-300">
        <div class="p-segmented-controls p-segmented-outline">
          <a href="#" class="active">Can</a>
          <a href="#">Dog</a>
          <a href="#">Pup</a>
        </div>
      </div>
    </div>

    <div class="content_smol" style="margin-top:15px">
      <div class="mw-300">
        <div class="p-segmented-controls p-segmented-controls-outline-alt">
          <a href="#" class="active">Mini</a>
          <a href="#">May</a>
          <a href="#">Moe</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Color Customization -->
  <div style="margin-top:30px">
    <div class="content_smol">
      <div class="mw-300">
        <div class="p-segmented-controls p-segmented-grey">
          <a href="#" class="active">Roadmap</a>
          <a href="#">Satelite</a>
        </div>
      </div>
    </div>
    <div class="content_smol" style="margin-top:15px">
      <div class="mw-300">
        <div class="p-segmented-controls demo_segmented">
          <a href="#" class="active">Roadmap</a>
          <a href="#">Satelite</a>
        </div>
      </div>
    </div>
  </div>

  <script src="res/segmented_controls.js"></script>
</body>
</html>
