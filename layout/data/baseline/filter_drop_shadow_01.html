<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; }
  body { background: white; display: flex; align-items: center; justify-content: center; }
  .triangle {
    width: 0; height: 0;
    border-left: 30px solid transparent;
    border-right: 30px solid transparent;
    border-bottom: 50px solid #e74c3c;
    filter: drop-shadow(4px 4px 3px rgba(0,0,0,0.5));
  }
</style>
</head>
<body>
  <div class="triangle"></div>
</body>
</html>
