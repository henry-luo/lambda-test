<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100px; height: 100px; overflow: hidden; background: white; }
  .underline {
    font-size: 14px;
    font-family: serif;
    color: #2c3e50;
    text-decoration: underline;
    text-decoration-color: #e74c3c;
    margin: 8px 5px;
  }
  .line-through {
    font-size: 14px;
    font-family: serif;
    color: #2c3e50;
    text-decoration: line-through;
    text-decoration-color: #3498db;
    margin: 8px 5px;
  }
  .overline {
    font-size: 14px;
    font-family: serif;
    color: #2c3e50;
    text-decoration: overline;
    text-decoration-color: #27ae60;
    margin: 8px 5px;
  }
</style>
</head>
<body>
  <div class="underline">Underline</div>
  <div class="line-through">Strikeout</div>
  <div class="overline">Overline</div>
</body>
</html>
