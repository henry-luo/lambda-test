<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test: box-shadow (outer, blur, inset)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; font-size: 14px; background: #eee; }

        .container {
            width: 720px;
            padding: 20px;
            background: #fff;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            align-items: center;
        }

        .box {
            width: 120px;
            height: 80px;
            background: #4a90d9;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            text-align: center;
        }

        /* 1. Sharp outer shadow (no blur) */
        .shadow-sharp {
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
        }

        /* 2. Outer shadow with blur */
        .shadow-blur {
            box-shadow: 3px 3px 8px rgba(0,0,0,0.4);
        }

        /* 3. Outer shadow with blur + spread */
        .shadow-spread {
            box-shadow: 0 4px 12px 4px rgba(40,120,200,0.5);
        }

        /* 4. Multiple shadows */
        .shadow-multi {
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3), -2px -2px 4px rgba(255,100,0,0.3);
        }

        /* 5. Inset shadow */
        .shadow-inset {
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.4);
            background: #d0e8ff;
            color: #333;
        }

        /* 6. Inset + outer shadow combination */
        .shadow-combo {
            box-shadow: 2px 2px 8px rgba(0,0,0,0.3), inset 0 2px 4px rgba(0,0,100,0.3);
        }

        /* 7. Colored shadow */
        .shadow-color {
            box-shadow: 4px 4px 10px rgba(255,50,50,0.7);
            background: #f9f0f0;
            color: #333;
        }

        /* 8. Large blur radius */
        .shadow-large-blur {
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        label {
            font-size: 10px;
            color: #555;
            display: block;
            text-align: center;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row">
        <div>
            <div class="box shadow-sharp">sharp</div>
            <label>sharp 4px 4px 0</label>
        </div>
        <div>
            <div class="box shadow-blur">blur</div>
            <label>blur 3px 3px 8px</label>
        </div>
        <div>
            <div class="box shadow-spread">spread</div>
            <label>spread 0 4px 12px 4px</label>
        </div>
        <div>
            <div class="box shadow-multi">multi</div>
            <label>2 outer shadows</label>
        </div>
    </div>
    <div class="row">
        <div>
            <div class="box shadow-inset">inset</div>
            <label>inset 0 2px 6px</label>
        </div>
        <div>
            <div class="box shadow-combo">combo</div>
            <label>outer + inset</label>
        </div>
        <div>
            <div class="box shadow-color">colored</div>
            <label>red shadow</label>
        </div>
        <div>
            <div class="box shadow-large-blur">large</div>
            <label>large blur 24px</label>
        </div>
    </div>
</div>
</body>
</html>
