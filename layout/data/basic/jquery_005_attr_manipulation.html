<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test: jQuery Attribute Manipulation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; font-size: 16px; }

        .test-container {
            width: 600px;
            padding: 20px;
            border: 2px solid #333;
            background-color: #f9f9f9;
        }

        .row {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            background-color: #fff;
            font-size: 14px;
        }

        .row label {
            display: inline-block;
            width: 120px;
            font-weight: bold;
        }

        a {
            color: #0066cc;
            text-decoration: underline;
        }

        img {
            display: block;
            margin: 8px 0;
            border: 1px solid #ccc;
        }

        [data-status="active"] {
            background-color: #ddffdd;
            border-left: 4px solid #00aa00;
        }

        [data-status="inactive"] {
            background-color: #ffdddd;
            border-left: 4px solid #aa0000;
        }

        [data-priority="high"] {
            font-weight: bold;
        }
    </style>
    <script src="../support/jquery-2.1.1.js"></script>
</head>
<body>
    <div class="test-container">
        <div id="row1" class="row">
            <label>Link:</label>
            <a id="link1" href="#">Click me</a>
        </div>

        <div id="row2" class="row">
            <label>Image:</label>
            <img id="img1" src="../support/green-1x1.png" width="60" height="60" alt="placeholder">
        </div>

        <div id="row3" class="row" data-status="inactive">
            <label>Status:</label>
            <span id="status-text">Check status</span>
        </div>

        <div id="row4" class="row">
            <label>Data attrs:</label>
            <span id="data-target">Data target</span>
        </div>

        <div id="row5" class="row">
            <label>Title:</label>
            <span id="title-target">Hover for title</span>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Set href attribute
            $('#link1').attr('href', 'https://example.com').text('Example Link');

            // Set image attributes
            $('#img1').attr({
                'alt': 'Red square',
                'width': '80',
                'height': '80'
            });

            // Change data attribute (CSS selector reacts)
            $('#row3').attr('data-status', 'active');
            $('#status-text').text('Active');

            // Set data attributes
            $('#row4').attr('data-status', 'active').attr('data-priority', 'high');
            $('#data-target').text('High priority active');

            // Set title attribute
            $('#title-target').attr('title', 'This is a tooltip');
        });
    </script>
</body>
</html>
